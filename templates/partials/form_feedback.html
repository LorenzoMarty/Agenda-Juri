{% if success %}
    <div class="status-card">
        <strong>{{ success_title }}</strong>
        <p>{{ success_copy }}</p>
    </div>
{% endif %}

{% if form.non_field_errors %}
    <div class="error-panel">
        <strong>{{ error_title|default:"Revise os dados." }}</strong>
        {{ form.non_field_errors }}
    </div>
{% endif %}
