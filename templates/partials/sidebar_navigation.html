{% load navigation %}
{% get_primary_navigation as primary_navigation %}

<nav class="nav" aria-label="Áreas do sistema">
    {% for item in primary_navigation %}
        <a class="nav-link {% if item.active %}active{% endif %}" href="{{ item.url }}" {% if item.active %}aria-current="page"{% endif %} aria-label="{{ item.label }}" title="{{ item.label }}">
            <span class="nav-icon" aria-hidden="true">{% include "partials/navigation_icon.html" with icon=item.icon %}</span>
            <span>{{ item.label }}</span>
        </a>
    {% endfor %}
</nav>
